<!DOCTYPE html>
<html lang='es'>

<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Bot de WhatsApp Inteligente</title>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='100%25' x2='100%25' y2='0%25'%3E%3Cstop offset='0%25' stop-color='%230ba771'/%3E%3Cstop offset='100%25' stop-color='%234ade80'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M3 17l6-6 4 4 8-8' stroke='url(%23g)' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M15 7h6v6' stroke='url(%23g)' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
    <link rel='stylesheet' href='css/style.css'>
</head>

<body>
    <style>
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 9999;
            background: rgba(16, 185, 129, 0.6);
            color: #fff;
            padding: 10px;
            width: 44px;
            height: 44px;
            text-decoration: none;
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            overflow: hidden;
            white-space: nowrap;
            box-sizing: border-box
        }

        .back-btn:hover {
            width: 165px;
            background: rgba(16, 185, 129, 0.9);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.3)
        }

        .back-btn .icon {
            font-size: 18px;
            min-width: 22px;
            display: flex;
            justify-content: center;
            align-items: center
        }

        .back-btn .text {
            opacity: 0;
            margin-left: 8px;
            transition: opacity 0.3s ease;
            font-size: 14px
        }

        .back-btn:hover .text {
            opacity: 1;
            transition-delay: 0.1s
        }
    </style><a href="../../index.html" class="back-btn"><span class="icon">←</span><span class="text">Volver al
            Inicio</span></a>
    <div id='app'></div>
    <script src='../shared/protect.js'></script>
    <script src='js/app.js'></script>
    <div class="demo-context">
        <h3>Contexto de Demostración</h3>
        <p>Simulador interactivo de <b>Agente Inteligente para WhatsApp</b>. Observa cómo la IA entiende lenguaje
            natural, agenda turnos en el calendario y responde consultas de manera autónoma 24/7.</p>
    </div>
    <style>
        .demo-context {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-left: 4px solid #10b981;
            color: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            max-width: 350px;
            z-index: 9999;
            backdrop-filter: blur(10px);
            font-family: 'Inter', sans-serif;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            animation: slideIn 0.5s ease-out;
        }

        .demo-context h3 {
            margin: 0 0 10px 0;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #10b981;
        }

        .demo-context p {
            margin: 0;
            font-size: 0.9rem;
            line-height: 1.5;
            color: #cbd5e1;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</body>

</html>
